<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AWS SAA-C03 — Script Viewer</title>
  <style>
    /* ── Tema: tokens ── */
    :root {
      --bg:              #f5f0eb;
      --surface:         #fff8f2;
      --text:            #2d2d2d;
      --text-muted:      #6b5e52;
      --accent-ana:      #4a7080;
      --accent-carlos:   #7a6040;
      --bullet-bg-ana:   #eaf1f4;
      --bullet-bg-carlos:#f4ede4;
      --border:          #ddd5cc;
      --header-bg:       rgba(245, 240, 235, 0.92);
      --badge-ana-text:  #2c5565;
      --badge-carlos-text:#5c4020;
      --btn-bg:          #e8e0d8;
      --btn-hover:       #dad0c6;
    }

    [data-theme="dark"] {
      --bg:              #1a1a1a;
      --surface:         #242424;
      --text:            #e0d9d0;
      --text-muted:      #9e9589;
      --accent-ana:      #6a9baa;
      --accent-carlos:   #b09070;
      --bullet-bg-ana:   #1a2d34;
      --bullet-bg-carlos:#2d2218;
      --border:          #3a3530;
      --header-bg:       rgba(26, 26, 26, 0.92);
      --badge-ana-text:  #8ecad8;
      --badge-carlos-text:#d4aa7a;
      --btn-bg:          #333028;
      --btn-hover:       #3e3a2e;
    }

    /* ── Reset + base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
      transition: background-color 0.25s, color 0.25s;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
    }

    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    #theme-btn {
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1.25rem;
      cursor: pointer;
      transition: background 0.2s;
      color: var(--text);
      line-height: 1;
    }

    #theme-btn:hover { background: var(--btn-hover); }

    /* ── Main content ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    /* ── Script list ── */
    #script-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .turn {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      border-left: 4px solid;
      padding: 0.85rem 1rem;
      overflow-wrap: break-word;
      transition: background 0.25s, border-color 0.25s;
    }

    .turn[data-speaker="ana"] {
      border-left-color: var(--accent-ana);
      background: var(--bullet-bg-ana);
    }

    .turn[data-speaker="carlos"] {
      border-left-color: var(--accent-carlos);
      background: var(--bullet-bg-carlos);
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
      padding: 0.15em 0.55em;
      border-radius: 4px;
    }

    .turn[data-speaker="ana"]    .badge {
      color: var(--badge-ana-text);
      background: transparent;
    }

    .turn[data-speaker="carlos"] .badge {
      color: var(--badge-carlos-text);
      background: transparent;
    }

    .turn-text {
      font-size: 1rem;
      color: var(--text);
    }

    /* ── Estado de carga / error ── */
    #status {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem 0;
      font-size: 0.95rem;
    }

    /* ── Turn number ── */
    .turn-num {
      float: right;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-left: 0.5rem;
      margin-top: 0.1rem;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-text">
        <h1 id="mod-title">AWS SAA-C03</h1>
        <div class="meta" id="mod-meta"></div>
      </div>
      <button id="theme-btn" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">◑</button>
    </div>
  </header>

  <main>
    <p id="status">Cargando guion…</p>
    <ul id="script-list" aria-label="Guion del episodio"></ul>
  </main>

  <script>
    // ── Tema ──────────────────────────────────────────────
    const root = document.documentElement;
    const btn  = document.getElementById('theme-btn');

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '☀' : '◑';
      btn.setAttribute('aria-label', theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
      localStorage.setItem('theme', theme);
    }

    // Detectar preferencia del sistema si no hay valor guardado
    const saved = localStorage.getItem('theme');
    const preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(preferred);

    btn.addEventListener('click', () => {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── Render del script ─────────────────────────────────
    const statusEl = document.getElementById('status');
    const listEl   = document.getElementById('script-list');
    const titleEl  = document.getElementById('mod-title');
    const metaEl   = document.getElementById('mod-meta');

    fetch('./01-AWS-Fundamentals.script.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        titleEl.textContent = data.module_title || 'AWS SAA-C03';
        if (data.estimated_duration_min) {
          metaEl.textContent = `Duración estimada: ${data.estimated_duration_min} min`;
        }

        const turns = data.turns || [];
        if (turns.length === 0) {
          statusEl.textContent = 'El guion está vacío.';
          return;
        }

        statusEl.remove();

        const fragment = document.createDocumentFragment();
        turns.forEach((turn, i) => {
          const li = document.createElement('li');
          li.className = 'turn';
          li.dataset.speaker = (turn.speaker || '').toLowerCase();

          const numSpan = document.createElement('span');
          numSpan.className = 'turn-num';
          numSpan.textContent = `#${i + 1}`;
          numSpan.setAttribute('aria-hidden', 'true');

          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = turn.speaker || '—';

          const p = document.createElement('p');
          p.className = 'turn-text';
          p.textContent = turn.text || '';

          li.appendChild(numSpan);
          li.appendChild(badge);
          li.appendChild(p);
          fragment.appendChild(li);
        });

        listEl.appendChild(fragment);
      })
      .catch(err => {
        statusEl.textContent = `No se pudo cargar el guion. (${err.message})`;
        console.error(err);
      });
  </script>

</body>
</html>
